version: '3.7'

services:
  redis:
    image: redis:6-alpine
    command: redis-server --appendonly yes
    healthcheck:
      test: redis-cli ping
    volumes:
      - ./redis/data:/data
    ports:
      - ${REDIS_PORT}:6379

  db:
    image: postgres:14.0-alpine
    healthcheck:
      test: pg_isready -U ${POSTGRES_USER} || exit 1
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - ./db/data:/var/lib/postgresql/data
    ports:
      - ${POSTGRES_PORT}:5432

  bittensor-pylon:
    image: docker.io/backenddevelopersltd/bittensor-pylon:2.2.0
    restart: unless-stopped
    environment:
      - PYLON_OPEN_ACCESS_TOKEN=${PYLON_OPEN_ACCESS_TOKEN}
    ports:
      - ${PYLON_PORT}:8000

  central-prometheus:
    image: prom/prometheus:v2.46.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --log.level=debug
      - --web.enable-remote-write-receiver
    volumes:
      - ./central-prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped
    ports:
      - 19090:9090

  on-site-prometheus:
    image: backenddevelopersltd/bittensor_prometheus
    command:
      - --log.level=debug
    environment:
      - BITTENSOR_WALLET_NAME=${BITTENSOR_WALLET_NAME}
      - BITTENSOR_WALLET_HOTKEY_NAME=${BITTENSOR_WALLET_HOTKEY_NAME}
    volumes:
      - ./on-site-prometheus.yml:/etc/prometheus/prometheus.yml.template
      - ~/.bittensor/wallets:/wallets
    restart: unless-stopped
    depends_on:
      - node-exporter
      - central-prometheus
    ports:
      - 29090:9090
    extra_hosts:
      - "host.docker.internal:host-gateway"

  node-exporter:
    image: prom/node-exporter:latest
    network_mode: host
    pid: host
    volumes:
      - /:/host:ro,rslave
    command:
      - '--path.rootfs=/host'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc|run|boot|var/.+)($$|/)'

  tempo:
    image: grafana/tempo:2.6.1
    command: ["-config.file=/etc/tempo.yml"]
    volumes:
      - ./tempo/tempo.yml:/etc/tempo.yml
    ports:
      - "3200:3200"
      - "4319:4319"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3200/ready || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  alloy:
    image: grafana/alloy:v1.15.1
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy
    ports:
      - "4317:4317"
      - "4318:4318"
    environment:
      - ON_SITE_PROXY_URL=${ON_SITE_PROXY_URL:-http://host.docker.internal:8000}
    command: run --stability.level=experimental /etc/alloy/config.alloy
    extra_hosts:
      - "host.docker.internal:host-gateway"

